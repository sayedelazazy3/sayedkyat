<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سيد العزازي | دفتر الخياطة</title>
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="سيد العزازي">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0c3b2e">
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Aref+Ruqaa:wght@400;700&family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root{
    --emerald-deep:#0c3b2e;
    --emerald:#12503d;
    --emerald-light:#1b6b52;
    --gold:#c9a24b;
    --gold-bright:#e6c565;
    --parchment:#f6f1e4;
    --parchment-dark:#ece3cc;
    --ink:#1c2420;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:var(--emerald-deep);
    background-image:
      radial-gradient(circle at 15% 10%, rgba(230,197,101,0.06), transparent 40%),
      radial-gradient(circle at 85% 90%, rgba(230,197,101,0.05), transparent 40%);
    color:var(--parchment);
    font-family:'Cairo', sans-serif;
    min-height:100vh;
    padding-bottom:60px;
  }
  .brand-name{ font-family:'Amiri', serif; }

  /* ===== Header ===== */
  header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:18px 20px;
    border-bottom:1px solid rgba(230,197,101,0.25);
    background:linear-gradient(180deg, rgba(0,0,0,0.15), transparent);
  }
  header .icon{
    width:52px; height:52px; border-radius:50%;
    border:2px solid var(--gold);
    overflow:hidden;
    box-shadow:0 0 14px rgba(230,197,101,0.35);
    flex-shrink:0;
  }
  header .icon img{width:100%; height:100%; object-fit:cover;}
  header .titles{ text-align:center; flex:1; }
  header h1{
    font-family:'Amiri', serif;
    color:var(--gold-bright);
    font-size:1.5rem;
    letter-spacing:1px;
  }
  header p{
    font-size:0.72rem;
    color:rgba(246,241,228,0.6);
    letter-spacing:2px;
    margin-top:2px;
  }
  header .spacer{width:52px;}

  /* ===== Hero ===== */
  .hero{
    text-align:center;
    padding:34px 20px 22px;
  }
  .hero .seal{
    width:150px; height:150px; margin:0 auto 14px;
    border-radius:50%;
    overflow:hidden;
    box-shadow:0 0 0 3px rgba(230,197,101,0.5), 0 10px 30px rgba(0,0,0,0.45);
  }
  .hero .seal img{width:100%; height:100%; object-fit:cover;}
  .hero h2{
    font-family:'Aref Ruqaa', serif;
    font-size:1.5rem;
    color:var(--gold-bright);
    font-weight:700;
    line-height:1.9;
  }
  .hero .rule{
    width:70px; height:2px; margin:14px auto;
    background:linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  /* ===== Tabs ===== */
  .tabs{
    display:flex; gap:8px; padding:0 16px; margin-bottom:18px;
  }
  .tab{
    flex:1; text-align:center; padding:11px 6px;
    border:1px solid rgba(230,197,101,0.35);
    border-radius:10px;
    font-size:0.85rem;
    color:rgba(246,241,228,0.75);
    cursor:pointer;
    transition:all .2s;
  }
  .tab.active{
    background:var(--gold);
    color:var(--emerald-deep);
    border-color:var(--gold);
    font-weight:800;
  }

  .panel{ display:none; padding:0 16px; animation:fadeIn .25s ease; }
  .panel.active{ display:block; }
  @keyframes fadeIn{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:none;} }

  /* ===== Card / Form ===== */
  .card{
    background:var(--parchment);
    color:var(--ink);
    border-radius:14px;
    padding:20px;
    margin-bottom:16px;
    box-shadow:0 8px 24px rgba(0,0,0,0.3);
    border:1px solid var(--parchment-dark);
    position:relative;
  }
  .card::before{
    content:"";
    position:absolute; inset:6px;
    border:1px solid rgba(18,80,61,0.15);
    border-radius:9px;
    pointer-events:none;
  }
  .field{ margin-bottom:14px; }
  .field label{
    display:block;
    font-size:0.8rem;
    color:var(--emerald);
    font-weight:700;
    margin-bottom:6px;
  }
  .field input, .field select{
    width:100%;
    padding:11px 12px;
    border:1.5px solid var(--parchment-dark);
    border-radius:8px;
    font-family:'Cairo', sans-serif;
    font-size:0.95rem;
    background:#fff;
    color:var(--ink);
  }
  .field input:focus, .field select:focus{
    outline:none;
    border-color:var(--gold);
    box-shadow:0 0 0 3px rgba(201,162,75,0.2);
  }
  .row2{ display:flex; gap:10px; }
  .row2 .field{ flex:1; }

  .btn{
    display:block; width:100%;
    padding:13px;
    border:none;
    border-radius:9px;
    background:linear-gradient(135deg, var(--emerald), var(--emerald-deep));
    color:var(--gold-bright);
    font-family:'Cairo', sans-serif;
    font-weight:800;
    font-size:0.95rem;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(0,0,0,0.25);
    transition:transform .15s;
  }
  .btn:active{ transform:scale(0.98); }
  .btn.gold{
    background:linear-gradient(135deg, var(--gold-bright), var(--gold));
    color:var(--emerald-deep);
  }
  .btn.ghost{
    background:transparent;
    border:1.5px solid var(--emerald);
    color:var(--emerald);
    box-shadow:none;
  }

  .hint{
    font-size:0.78rem;
    color:rgba(28,36,32,0.55);
    margin-top:8px;
    text-align:center;
  }

  /* ===== Customer list ===== */
  .search{ margin-bottom:14px; }
  .cust-item{
    background:var(--parchment);
    color:var(--ink);
    border-radius:12px;
    padding:14px 16px;
    margin-bottom:10px;
    display:flex; justify-content:space-between; align-items:center;
    cursor:pointer;
    border:1px solid var(--parchment-dark);
  }
  .cust-item:active{ background:var(--parchment-dark); }
  .cust-item .name{ font-weight:800; font-size:1rem; }
  .cust-item .count{ font-size:0.75rem; color:rgba(28,36,32,0.55); margin-top:2px;}
  .cust-item .balance{ font-weight:800; font-size:0.95rem; }
  .balance.due{ color:#a5322a; }
  .balance.clear{ color:var(--emerald); }

  .empty{
    text-align:center;
    padding:40px 20px;
    color:rgba(246,241,228,0.55);
    font-size:0.9rem;
  }

  /* ===== Customer page ===== */
  .page-header{
    display:flex; justify-content:space-between; align-items:center;
    margin-bottom:14px;
  }
  .page-header h3{ font-family:'Amiri', serif; color:var(--gold-bright); font-size:1.3rem; }
  .back-link{
    font-size:0.85rem; color:var(--gold-bright); cursor:pointer;
    text-decoration:underline;
  }
  .summary-card{
    background:linear-gradient(135deg, var(--emerald), var(--emerald-light));
    border-radius:14px;
    padding:16px 18px;
    margin-bottom:16px;
    display:flex; justify-content:space-between;
    box-shadow:0 8px 20px rgba(0,0,0,0.3);
  }
  .summary-card div{ text-align:center; flex:1; }
  .summary-card .label{ font-size:0.72rem; color:rgba(246,241,228,0.7); margin-bottom:4px;}
  .summary-card .value{ font-size:1.1rem; font-weight:800; color:var(--gold-bright); }

  .order-card{
    background:var(--parchment);
    color:var(--ink);
    border-radius:12px;
    padding:14px 16px;
    margin-bottom:10px;
    border-inset-start:4px solid var(--gold);
    border-right:4px solid var(--gold);
    position:relative;
  }
  .order-card .top{ display:flex; justify-content:space-between; margin-bottom:6px;}
  .order-card .type{ font-weight:800; }
  .order-card .date{ font-size:0.72rem; color:rgba(28,36,32,0.5); }
  .order-card .detail{ font-size:0.85rem; color:rgba(28,36,32,0.75); margin-bottom:2px;}
  .order-card .status{
    display:inline-block;
    font-size:0.72rem;
    font-weight:800;
    padding:3px 10px;
    border-radius:20px;
    margin-top:6px;
  }
  .status.paid{ background:rgba(18,80,61,0.12); color:var(--emerald); }
  .status.due{ background:rgba(165,50,42,0.12); color:#a5322a; }

  /* ===== Footer ===== */
  footer{
    text-align:center;
    padding:36px 20px 20px;
    border-top:1px solid rgba(230,197,101,0.2);
    margin-top:30px;
  }
  footer .seal{
    width:64px; height:64px; margin:0 auto 10px;
    border-radius:50%;
    overflow:hidden;
    box-shadow:0 0 0 2px rgba(230,197,101,0.4);
  }
  footer .seal img{width:100%; height:100%; object-fit:cover;}
  footer .name{ font-family:'Amiri', serif; color:var(--gold-bright); font-size:1rem; }
  footer .tag{ font-size:0.75rem; color:rgba(246,241,228,0.5); margin-top:4px;}

  /* ===== Toast ===== */
  .toast{
    position:fixed; bottom:20px; right:50%; transform:translateX(50%);
    background:var(--gold-bright); color:var(--emerald-deep);
    padding:12px 22px; border-radius:30px;
    font-weight:800; font-size:0.85rem;
    box-shadow:0 8px 20px rgba(0,0,0,0.4);
    opacity:0; pointer-events:none;
    transition:opacity .3s, transform .3s;
    z-index:999;
    white-space:nowrap;
  }
  .toast.show{ opacity:1; transform:translateX(50%) translateY(-6px); }

  /* ===== Print invoice ===== */
  #printArea{ display:none; }
  @media print{
    body *{ visibility:hidden; }
    #printArea, #printArea *{ visibility:visible; }
    #printArea{
      display:block !important;
      position:absolute; top:0; right:0; width:100%;
      background:#fff; color:#000; padding:30px;
    }
    .no-print{ display:none !important; }
  }
</style>

  <h2 class="brand-name">دفتر الخياط الذكي</h2>
  <div class="rule"></div>
</div>

<div class="tabs">
  <div class="tab active" data-tab="new" onclick="switchTab('new')">فاتورة جديدة</div>
  <div class="tab" data-tab="book" onclick="switchTab('book')">دفتر الزباين</div>
</div>

<!-- ===== New Order Panel ===== -->
<div class="panel active" id="panel-new">
  <div class="card">
    <div class="field">
      <label>اسم الزبون</label>
      <input id="in-name" list="names-list" placeholder="مثال: أحمد محمد">
      <datalist id="names-list"></datalist>
    </div>
    <div class="field">
      <label>نوع الشغل</label>
      <select id="in-type">
        <option>جلابية رجالي</option>
        <option>جلابية حريمي</option>
        <option>فستان</option>
        <option>بدلة</option>
        <option>تفصيل آخر</option>
      </select>
    </div>
    <div class="row2">
      <div class="field">
        <label>عدد القطع</label>
        <input id="in-qty" type="number" min="1" value="1">
      </div>
      <div class="field">
        <label>سعر القطعة (جنيه)</label>
        <input id="in-price" type="number" min="0">
      </div>
    </div>
    <div class="field">
      <label>المبلغ المدفوع (جنيه)</label>
      <input id="in-paid" type="number" min="0" value="0">
    </div>
    <button class="btn gold" onclick="submitOrder()">حفظ في صفحة الزبون</button>
    <p class="hint">لو اسم الزبون موجود من قبل، هتتضاف العملية على نفس صفحته</p>
  </div>
</div>

<!-- ===== Customer Book Panel ===== -->
<div class="panel" id="panel-book">
  <div class="card search">
    <input id="search-box" placeholder="🔍 دور باسم الزبون..." oninput="renderCustomerList()">
  </div>
  <div id="customer-list"></div>
  <div style="display:flex; gap:8px; margin-top:16px;">
    <button class="btn ghost" style="flex:1; font-size:0.8rem; padding:10px;" onclick="exportBackup()">⬇ نسخة احتياطية</button>
    <label class="btn ghost" style="flex:1; font-size:0.8rem; padding:10px; text-align:center; cursor:pointer;">
      ⬆ استرجاع نسخة
      <input type="file" accept=".json" style="display:none" onchange="importBackup(this)">
    </label>
  </div>
</div>

<!-- ===== Customer Page Panel ===== -->
<div class="panel" id="panel-customer">
  <div class="page-header">
    <h3 class="brand-name" id="cust-page-name"></h3>
    <span class="back-link" onclick="switchTab('book')">◀ رجوع للدفتر</span>
  </div>
  <div class="summary-card">
    <div>
      <div class="label">إجمالي الحسابات</div>
      <div class="value" id="cust-total">0</div>
    </div>
    <div>
      <div class="label">المدفوع</div>
      <div class="value" id="cust-paid">0</div>
    </div>
    <div>
      <div class="label">الباقي</div>
      <div class="value" id="cust-due">0</div>
    </div>
  </div>
  <button class="btn ghost" style="margin-bottom:14px" onclick="newOrderForCustomer()">+ إضافة عملية جديدة لهذا الزبون</button>
  <div id="cust-orders"></div>
  <button class="btn" style="margin-top:18px; background:linear-gradient(135deg, #a5322a, #7a231d); color:#fff;" onclick="deleteCustomer()">🗑 حذف صفحة هذا الزبون نهائياً</button>
</div>

    <h2 style="font-family:serif; margin-top:10px;">سيد العزازي</h2>
    <p style="font-size:12px; color:#555;">لخياطة الجلابيات والفساتين</p>
  </div>
  <hr>
  <table style="width:100%; margin-top:16px; font-size:14px;" id="print-table"></table>
</div>

<script>
let customers = {};
let currentCustomer = null;
const STORAGE_KEY = "customers-data";

async function loadData(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    customers = raw ? JSON.parse(raw) : {};
  }catch(e){
    customers = {};
  }
  renderCustomerList();
  refreshNamesList();
}

async function saveData(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(customers));
  }catch(e){
    console.error("تعذر الحفظ", e);
    showToast('تعذر حفظ البيانات على هذا الجهاز');
  }
}

function exportBackup(){
  const blob = new Blob([JSON.stringify(customers, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'نسخة-احتياطية-' + new Date().toLocaleDateString('en-GB').replace(/\//g,'-') + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function importBackup(input){
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = async function(e){
    try{
      const data = JSON.parse(e.target.result);
      customers = data;
      await saveData();
      refreshNamesList();
      renderCustomerList();
      showToast('تم استرجاع النسخة الاحتياطية ✅');
    }catch(err){
      showToast('الملف غير صالح');
    }
  };
  reader.readAsText(file);
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=> t.classList.remove('show'), 2200);
}

function switchTab(name){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  if(name === 'new'){
    document.querySelector('.tab[data-tab="new"]').classList.add('active');
    document.getElementById('panel-new').classList.add('active');
  } else if(name === 'book'){
    document.querySelector('.tab[data-tab="book"]').classList.add('active');
    document.getElementById('panel-book').classList.add('active');
    renderCustomerList();
  } else if(name === 'customer'){
    document.getElementById('panel-customer').classList.add('active');
  }
}

function refreshNamesList(){
  const dl = document.getElementById('names-list');
  dl.innerHTML = Object.keys(customers).map(n=>`<option value="${n}">`).join('');
}

async function submitOrder(){
  const name = document.getElementById('in-name').value.trim();
  const type = document.getElementById('in-type').value;
  const qty = parseInt(document.getElementById('in-qty').value);
  const price = parseFloat(document.getElementById('in-price').value);
  const paid = parseFloat(document.getElementById('in-paid').value) || 0;

  if(!name){ showToast('اكتب اسم الزبون أولاً'); return; }
  if(!qty || qty <= 0 || isNaN(price) || price < 0){ showToast('تأكد من عدد القطع والسعر'); return; }

  const total = qty * price;
  const due = total - paid;
  const isNew = !customers[name];

  if(isNew) customers[name] = [];

  customers[name].push({
    type, qty, price, total, paid,
    due: due > 0 ? due : 0,
    extra: due < 0 ? Math.abs(due) : 0,
    date: new Date().toLocaleDateString('ar-EG')
  });

  await saveData();
  refreshNamesList();

  document.getElementById('in-price').value = '';
  document.getElementById('in-paid').value = '0';
  document.getElementById('in-qty').value = '1';

  showToast(isNew ? `تم فتح صفحة جديدة لـ ${name} ✅` : `تمت الإضافة لصفحة ${name} ✅`);
}

function renderCustomerList(){
  const q = (document.getElementById('search-box')?.value || '').trim();
  const list = document.getElementById('customer-list');
  const names = Object.keys(customers).filter(n => n.includes(q));

  if(names.length === 0){
    list.innerHTML = `<div class="empty">لسه مفيش زباين مسجلين${q ? ' بهذا الاسم' : ''}<br>ابدأ بأول فاتورة من التبويب التاني</div>`;
    return;
  }

  list.innerHTML = names.map(name=>{
    const orders = customers[name];
    const totalDue = orders.reduce((s,o)=> s + o.due, 0);
    return `<div class="cust-item" onclick="openCustomer('${name.replace(/'/g,"\\'")}')">
      <div>
        <div class="name">${name}</div>
        <div class="count">${orders.length} عملية</div>
      </div>
      <div class="balance ${totalDue > 0 ? 'due' : 'clear'}">
        ${totalDue > 0 ? totalDue + ' جنيه متبقي' : 'مسدد بالكامل'}
      </div>
    </div>`;
  }).join('');
}

function openCustomer(name){
  currentCustomer = name;
  const orders = customers[name] || [];
  document.getElementById('cust-page-name').textContent = name;

  const total = orders.reduce((s,o)=> s + o.total, 0);
  const paid = orders.reduce((s,o)=> s + o.paid, 0);
  const due = orders.reduce((s,o)=> s + o.due, 0);
  document.getElementById('cust-total').textContent = total + ' ج';
  document.getElementById('cust-paid').textContent = paid + ' ج';
  document.getElementById('cust-due').textContent = due + ' ج';

  document.getElementById('cust-orders').innerHTML = orders.map((o,i)=>`
    <div class="order-card">
      <div class="top">
        <span class="type">${o.type}</span>
        <span class="date">${o.date}</span>
      </div>
      <div class="detail">العدد: ${o.qty} قطعة × ${o.price} جنيه = ${o.total} جنيه</div>
      <div class="detail">المدفوع: ${o.paid} جنيه</div>
      ${o.due > 0 ? `<span class="status due">باقي عليه ${o.due} جنيه</span>` : ''}
      ${o.extra > 0 ? `<span class="status paid">دفع زيادة ${o.extra} جنيه</span>` : ''}
      ${o.due === 0 && o.extra === 0 ? `<span class="status paid">تم السداد بالكامل</span>` : ''}
      <div style="margin-top:8px;">
        <span class="back-link" style="font-size:0.75rem;" onclick="printInvoice('${name.replace(/'/g,"\\'")}', ${i})">🖨 طباعة فاتورة هذه العملية</span>
      </div>
    </div>
  `).join('');

  switchTab('customer');
}

function newOrderForCustomer(){
  document.getElementById('in-name').value = currentCustomer;
  switchTab('new');
}

async function deleteCustomer(){
  if(!currentCustomer) return;
  const sure = confirm(`متأكد إنك عايز تمسح صفحة "${currentCustomer}" بكل عملياته نهائياً؟ الخطوة دي مش هترجع.`);
  if(!sure) return;
  delete customers[currentCustomer];
  await saveData();
  refreshNamesList();
  showToast(`تم حذف صفحة ${currentCustomer}`);
  currentCustomer = null;
  switchTab('book');
}

function printInvoice(name, idx){
  const o = customers[name][idx];
  const rows = `
    <tr><td style="padding:6px 0;">الزبون</td><td style="text-align:left;">${name}</td></tr>
    <tr><td style="padding:6px 0;">التاريخ</td><td style="text-align:left;">${o.date}</td></tr>
    <tr><td style="padding:6px 0;">نوع الشغل</td><td style="text-align:left;">${o.type}</td></tr>
    <tr><td style="padding:6px 0;">عدد القطع</td><td style="text-align:left;">${o.qty}</td></tr>
    <tr><td style="padding:6px 0;">سعر القطعة</td><td style="text-align:left;">${o.price} جنيه</td></tr>
    <tr><td style="padding:8px 0; font-weight:bold; border-top:1px solid #ccc;">الإجمالي</td><td style="text-align:left; font-weight:bold; border-top:1px solid #ccc;">${o.total} جنيه</td></tr>
    <tr><td style="padding:6px 0;">المدفوع</td><td style="text-align:left;">${o.paid} جنيه</td></tr>
    <tr><td style="padding:6px 0; font-weight:bold;">${o.due > 0 ? 'الباقي' : 'الحالة'}</td><td style="text-align:left; font-weight:bold;">${o.due > 0 ? o.due + ' جنيه' : 'مسدد بالكامل'}</td></tr>
  `;
  document.getElementById('print-table').innerHTML = rows;
  window.print();
}

loadData();
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js').catch(() => {});
  });
}
</script>
