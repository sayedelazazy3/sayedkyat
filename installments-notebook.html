<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دفتر الأقساط | سيد العزازي</title>
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="theme-color" content="#0c3b2e">
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Aref+Ruqaa:wght@400;700&family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root{
    --emerald-deep:#0c3b2e; --emerald:#12503d; --emerald-light:#1b6b52;
    --gold:#c9a24b; --gold-bright:#e6c565;
    --parchment:#f6f1e4; --parchment-dark:#ece3cc; --ink:#1c2420;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:var(--emerald-deep);
    background-image:radial-gradient(circle at 15% 10%, rgba(230,197,101,0.06), transparent 40%),
                      radial-gradient(circle at 85% 90%, rgba(230,197,101,0.05), transparent 40%);
    color:var(--parchment); font-family:'Cairo', sans-serif;
    min-height:100vh; padding-bottom:50px;
  }
  .brand-name{ font-family:'Amiri', serif; }
  header{ display:flex; align-items:center; justify-content:space-between; padding:16px 20px; border-bottom:1px solid rgba(230,197,101,0.25); }
  header .back{ color:var(--gold-bright); text-decoration:none; font-size:0.85rem; font-weight:700; }
  header h1{ font-family:'Aref Ruqaa', serif; color:var(--gold-bright); font-size:1.2rem; }
  header .spacer{width:60px;}

  .hero{ text-align:center; padding:20px 20px 6px; }
  .hero .badge{
    width:78px; height:78px; margin:0 auto 10px; border-radius:50%;
    background:radial-gradient(circle at 35% 30%, var(--emerald-light), var(--emerald-deep));
    display:flex; align-items:center; justify-content:center; font-size:2.1rem;
    box-shadow:0 0 0 3px var(--gold), 0 8px 18px rgba(0,0,0,0.3);
  }
  .hero p{ font-size:0.8rem; color:rgba(246,241,228,0.6); margin-top:6px; }

  .tabs{ display:flex; gap:6px; padding:16px 16px 14px; }
  .tab{
    flex:1; text-align:center; padding:10px 4px;
    border:1px solid rgba(230,197,101,0.35); border-radius:10px;
    font-size:0.78rem; color:rgba(246,241,228,0.75); cursor:pointer;
  }
  .tab.active{ background:var(--gold); color:var(--emerald-deep); border-color:var(--gold); font-weight:800; }

  .panel{ display:none; padding:0 16px; }
  .panel.active{ display:block; animation:fadeIn .2s ease; }
  @keyframes fadeIn{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:none;} }

  .card{
    background:var(--parchment); color:var(--ink); border-radius:14px; padding:18px;
    margin-bottom:14px; box-shadow:0 8px 20px rgba(0,0,0,0.28); border:1px solid var(--parchment-dark);
  }
  .field{ margin-bottom:12px; }
  .field label{ display:block; font-size:0.78rem; color:var(--emerald); font-weight:700; margin-bottom:5px; }
  .field input, .field select, .field textarea{
    width:100%; padding:10px 12px; border:1.5px solid var(--parchment-dark); border-radius:8px;
    font-family:'Cairo', sans-serif; font-size:0.9rem; background:#fff; color:var(--ink);
  }
  .row2{ display:flex; gap:8px; }
  .row2 .field{ flex:1; }

  .btn{
    display:block; width:100%; padding:12px; border:none; border-radius:9px;
    background:linear-gradient(135deg, var(--emerald), var(--emerald-deep));
    color:var(--gold-bright); font-family:'Cairo', sans-serif; font-weight:800; font-size:0.9rem; cursor:pointer;
  }
  .btn.gold{ background:linear-gradient(135deg, var(--gold-bright), var(--gold)); color:var(--emerald-deep); }
  .btn.ghost{ background:transparent; border:1.5px solid var(--emerald); color:var(--emerald); }
  .btn.danger{ background:linear-gradient(135deg, #a5322a, #7a231d); color:#fff; }

  .hint{ font-size:0.74rem; color:rgba(28,36,32,0.55); margin-top:6px; text-align:center; }

  .item-row{
    background:var(--parchment); color:var(--ink); border-radius:12px; padding:13px 15px; margin-bottom:9px;
    display:flex; justify-content:space-between; align-items:center; cursor:pointer; border:1px solid var(--parchment-dark);
  }
  .item-row .name{ font-weight:800; font-size:0.95rem; }
  .item-row .sub{ font-size:0.72rem; color:rgba(28,36,32,0.55); margin-top:2px;}
  .tag{ font-weight:800; font-size:0.8rem; padding:4px 10px; border-radius:20px; }
  .tag.due{ background:rgba(165,50,42,0.12); color:#a5322a; }
  .tag.clear{ background:rgba(18,80,61,0.12); color:var(--emerald); }

  .empty{ text-align:center; padding:30px 20px; color:rgba(246,241,228,0.55); font-size:0.85rem; }

  .page-header{ display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
  .page-header h3{ font-family:'Amiri', serif; color:var(--gold-bright); font-size:1.1rem; }
  .back-link{ font-size:0.8rem; color:var(--gold-bright); cursor:pointer; text-decoration:underline; }

  .summary-card{
    background:linear-gradient(135deg, var(--emerald), var(--emerald-light));
    border-radius:14px; padding:14px 12px; margin-bottom:14px;
    display:flex; flex-wrap:wrap; gap:10px;
  }
  .summary-card div{ text-align:center; flex:1; min-width:80px; }
  .summary-card .label{ font-size:0.65rem; color:rgba(246,241,228,0.7); margin-bottom:3px;}
  .summary-card .value{ font-size:0.95rem; font-weight:800; color:var(--gold-bright); }

  .section-title{ font-size:0.85rem; font-weight:800; color:var(--gold-bright); margin:14px 0 8px; }

  .entry{
    background:var(--parchment); color:var(--ink); border-radius:12px; padding:13px 15px; margin-bottom:9px;
    border-right:4px solid var(--gold); position:relative;
  }
  .entry .top{ display:flex; justify-content:space-between; margin-bottom:4px; }
  .entry .type{ font-weight:800; font-size:0.88rem; }
  .entry .date{ font-size:0.7rem; color:rgba(28,36,32,0.5); }
  .entry .detail{ font-size:0.82rem; color:rgba(28,36,32,0.75); margin-bottom:2px; }
  .entry .del{ position:absolute; left:12px; bottom:10px; font-size:0.7rem; color:#a5322a; cursor:pointer; }

  .toast{
    position:fixed; bottom:20px; right:50%; transform:translateX(50%);
    background:var(--gold-bright); color:var(--emerald-deep); padding:11px 20px; border-radius:30px;
    font-weight:800; font-size:0.8rem; box-shadow:0 8px 20px rgba(0,0,0,0.4);
    opacity:0; pointer-events:none; transition:opacity .3s, transform .3s; z-index:999; white-space:nowrap;
  }
  .toast.show{ opacity:1; transform:translateX(50%) translateY(-6px); }
</style>
</head>
<body>

<header>
  <a class="back" href="index.html">◀ الدفاتر</a>
  <h1 class="brand-name">دفتر الأقساط</h1>
  <div class="spacer"></div>
</header>

<div class="hero">
  <div class="badge">💰</div>
  <p>سجل أي عملية بيع بالتقسيط، وتابع الباقي أول بأول</p>
</div>

<div class="tabs">
  <div class="tab active" data-tab="new" onclick="switchTab('new')">عملية جديدة</div>
  <div class="tab" data-tab="list" onclick="switchTab('list')">الحسابات</div>
</div>

<!-- ===== عملية بيع جديدة بالتقسيط ===== -->
<div class="panel active" id="panel-new">
  <div class="card">
    <div class="field"><label>اسم العميل</label><input id="n-buyer" placeholder="مثال: كريم حسن"></div>
    <div class="field"><label>وصف السلعة أو الغرض</label><input id="n-desc" placeholder="مثال: تليفزيون 43 بوصة"></div>
    <div class="field"><label>السعر الإجمالي (جنيه)</label><input id="n-total" type="number" min="0"></div>
    <div class="field"><label>المقدم المدفوع الآن (جنيه)</label><input id="n-down" type="number" min="0" value="0"></div>
    <div class="field"><label>ملاحظات (اختياري)</label><textarea id="n-notes" rows="2"></textarea></div>
    <button class="btn gold" onclick="createAccount()">حفظ العملية</button>
  </div>
</div>

<!-- ===== قائمة الحسابات ===== -->
<div class="panel" id="panel-list">
  <div class="card">
    <input id="search-box" placeholder="🔍 دور باسم العميل..." oninput="renderList()">
  </div>
  <div id="account-list"></div>
  <div style="display:flex; gap:8px; margin-top:16px;">
    <button class="btn ghost" style="flex:1; font-size:0.78rem; padding:10px;" onclick="exportBackup()">⬇ نسخة احتياطية</button>
    <label class="btn ghost" style="flex:1; font-size:0.78rem; padding:10px; text-align:center; cursor:pointer;">
      ⬆ استرجاع نسخة
      <input type="file" accept=".json" style="display:none" onchange="importBackup(this)">
    </label>
  </div>
</div>

<!-- ===== صفحة الحساب ===== -->
<div class="panel" id="panel-account-page">
  <div class="page-header">
    <h3 class="brand-name" id="account-page-title"></h3>
    <span class="back-link" onclick="switchTab('list')">◀ رجوع للحسابات</span>
  </div>

  <div class="summary-card" id="account-summary"></div>

  <div class="card" id="pay-form" style="display:none;">
    <div class="field"><label>مبلغ القسط المدفوع (جنيه)</label><input id="pay-amount" type="number" min="0"></div>
    <div class="field"><label>ملاحظة (اختياري)</label><input id="pay-note" placeholder="مثال: قسط شهر أغسطس"></div>
    <button class="btn gold" onclick="submitPayment()">حفظ القسط</button>
  </div>
  <button class="btn ghost" style="margin-bottom:14px" onclick="togglePayForm()">+ تسجيل قسط جديد</button>

  <div class="section-title">سجل الأقساط</div>
  <div id="account-payments"></div>

  <button class="btn danger" style="margin-top:18px;" onclick="deleteAccount()">🗑 حذف هذا الحساب نهائياً</button>
</div>

<div class="toast" id="toast"></div>

<script>
let accounts = [];
let currentAccountId = null;
const ACCOUNTS_KEY = "installments-accounts";

function loadData(){
  try{ accounts = JSON.parse(localStorage.getItem(ACCOUNTS_KEY) || "[]"); }
  catch(e){ accounts = []; }
  renderList();
}
function saveAccounts(){
  try{ localStorage.setItem(ACCOUNTS_KEY, JSON.stringify(accounts)); }
  catch(e){ showToast('تعذر حفظ البيانات'); }
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=> t.classList.remove('show'), 2200);
}

function switchTab(name){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  const map = {new:'panel-new', list:'panel-list'};
  if(map[name]){
    document.querySelector(`.tab[data-tab="${name}"]`).classList.add('active');
    document.getElementById(map[name]).classList.add('active');
    if(name==='list') renderList();
  } else if(name==='account-page'){
    document.getElementById('panel-account-page').classList.add('active');
  }
}

/* ===== عملية جديدة ===== */
function createAccount(){
  const buyer = document.getElementById('n-buyer').value.trim();
  const desc = document.getElementById('n-desc').value.trim();
  const total = parseFloat(document.getElementById('n-total').value);
  const down = parseFloat(document.getElementById('n-down').value) || 0;
  const notes = document.getElementById('n-notes').value.trim();

  if(!buyer){ showToast('اكتب اسم العميل'); return; }
  if(!desc){ showToast('اكتب وصف السلعة أو الغرض'); return; }
  if(!total || total <= 0){ showToast('اكتب سعر إجمالي صحيح'); return; }

  const payments = [];
  if(down > 0){
    payments.push({ amount: down, note: 'مقدم عند التعاقد', date: new Date().toISOString() });
  }

  accounts.push({
    id: Date.now() + Math.random().toString(36).slice(2,7),
    buyer, desc, totalPrice: total, notes,
    createdDate: new Date().toISOString(),
    payments
  });
  saveAccounts();

  document.getElementById('n-buyer').value = '';
  document.getElementById('n-desc').value = '';
  document.getElementById('n-total').value = '';
  document.getElementById('n-down').value = '0';
  document.getElementById('n-notes').value = '';
  showToast(`تم فتح حساب ${buyer} ✅`);
}

/* ===== الحسابات ===== */
function totalPaid(a){ return a.payments.reduce((s,p)=> s + p.amount, 0); }
function remaining(a){ const r = a.totalPrice - totalPaid(a); return r > 0 ? r : 0; }

function renderList(){
  const q = (document.getElementById('search-box')?.value || '').trim();
  const list = document.getElementById('account-list');
  const filtered = accounts.filter(a => a.buyer.includes(q));

  if(filtered.length === 0){
    list.innerHTML = `<div class="empty">لا يوجد حسابات${q ? ' بهذا الاسم' : ''}<br>ابدأ بعملية جديدة من التبويب التاني</div>`;
    return;
  }

  list.innerHTML = filtered.map(a=>{
    const rem = remaining(a);
    return `<div class="item-row" onclick="openAccount('${a.id}')">
      <div>
        <div class="name">${a.buyer}</div>
        <div class="sub">${a.desc} | الإجمالي: ${a.totalPrice} ج</div>
      </div>
      <span class="tag ${rem > 0 ? 'due' : 'clear'}">${rem > 0 ? rem + ' ج متبقي' : 'مسدد بالكامل'}</span>
    </div>`;
  }).join('');
}

function openAccount(id){
  currentAccountId = id;
  const a = accounts.find(x=>x.id===id);
  document.getElementById('account-page-title').textContent = a.buyer + ' — ' + a.desc;

  const paid = totalPaid(a);
  const rem = remaining(a);
  document.getElementById('account-summary').innerHTML = `
    <div><div class="label">السعر الإجمالي</div><div class="value">${a.totalPrice} ج</div></div>
    <div><div class="label">المدفوع</div><div class="value">${paid} ج</div></div>
    <div><div class="label">الباقي</div><div class="value">${rem} ج</div></div>
  `;
  document.getElementById('pay-form').style.display = 'none';

  document.getElementById('account-payments').innerHTML = a.payments.length === 0
    ? `<div class="empty">لسه مفيش أقساط مدفوعة</div>`
    : a.payments.map((p,i)=>{
        const paidUpTo = a.payments.slice(0,i+1).reduce((s,x)=>s+x.amount,0);
        const remAfter = a.totalPrice - paidUpTo;
        return `<div class="entry">
          <div class="top"><span class="type">${p.amount} جنيه</span><span class="date">${new Date(p.date).toLocaleDateString('ar-EG')}</span></div>
          ${p.note ? `<div class="detail">${p.note}</div>` : ''}
          <div class="detail">${remAfter > 0 ? 'الباقي بعد هذا القسط: ' + remAfter + ' جنيه' : 'تم السداد بالكامل ✅'}</div>
          <span class="del" onclick="deletePayment(${i})">حذف</span>
        </div>`;
      }).join('');

  switchTab('account-page');
}

function togglePayForm(){
  const form = document.getElementById('pay-form');
  form.style.display = form.style.display === 'none' ? 'block' : 'none';
}

function submitPayment(){
  const a = accounts.find(x=>x.id===currentAccountId);
  const amount = parseFloat(document.getElementById('pay-amount').value);
  const note = document.getElementById('pay-note').value.trim();
  if(!amount || amount <= 0){ showToast('اكتب مبلغ صحيح'); return; }
  a.payments.push({ amount, note, date: new Date().toISOString() });
  saveAccounts();
  document.getElementById('pay-amount').value = '';
  document.getElementById('pay-note').value = '';
  showToast('تم تسجيل القسط ✅');
  openAccount(currentAccountId);
}

function deletePayment(i){
  if(!confirm('حذف هذا القسط؟')) return;
  const a = accounts.find(x=>x.id===currentAccountId);
  a.payments.splice(i,1);
  saveAccounts();
  openAccount(currentAccountId);
}

function deleteAccount(){
  if(!confirm('متأكد إنك عايز تمسح هذا الحساب نهائياً بكل أقساطه؟')) return;
  accounts = accounts.filter(a => a.id !== currentAccountId);
  saveAccounts();
  showToast('تم الحذف');
  currentAccountId = null;
  switchTab('list');
}

/* ===== نسخ احتياطي ===== */
function exportBackup(){
  const blob = new Blob([JSON.stringify(accounts, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'نسخة-احتياطية-الأقساط-' + new Date().toLocaleDateString('en-GB').replace(/\//g,'-') + '.json';
  a.click();
  URL.revokeObjectURL(url);
}
function importBackup(input){
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    try{
      accounts = JSON.parse(e.target.result);
      saveAccounts();
      renderList();
      showToast('تم استرجاع النسخة الاحتياطية ✅');
    }catch(err){ showToast('الملف غير صالح'); }
  };
  reader.readAsText(file);
}

loadData();
</script>
</body>
</html>
