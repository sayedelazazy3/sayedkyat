<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دفتر دروس القرآن | سيد العزازي</title>
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="theme-color" content="#0c3b2e">
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Aref+Ruqaa:wght@400;700&family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root{
    --emerald-deep:#0c3b2e;
    --emerald:#12503d;
    --emerald-light:#1b6b52;
    --gold:#c9a24b;
    --gold-bright:#e6c565;
    --parchment:#f6f1e4;
    --parchment-dark:#ece3cc;
    --ink:#1c2420;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:var(--emerald-deep);
    background-image:radial-gradient(circle at 15% 10%, rgba(230,197,101,0.06), transparent 40%),
                      radial-gradient(circle at 85% 90%, rgba(230,197,101,0.05), transparent 40%);
    color:var(--parchment);
    font-family:'Cairo', sans-serif;
    min-height:100vh;
    padding-bottom:50px;
  }
  .brand-name{ font-family:'Amiri', serif; }

  header{
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 20px;
    border-bottom:1px solid rgba(230,197,101,0.25);
  }
  header .back{
    color:var(--gold-bright); text-decoration:none; font-size:0.85rem; font-weight:700;
  }
  header h1{ font-family:'Aref Ruqaa', serif; color:var(--gold-bright); font-size:1.2rem; }
  header .spacer{width:60px;}

  .hero{ text-align:center; padding:20px 20px 6px; }
  .hero .badge{
    width:78px; height:78px; margin:0 auto 10px;
    border-radius:50%;
    background:radial-gradient(circle at 35% 30%, var(--emerald-light), var(--emerald-deep));
    display:flex; align-items:center; justify-content:center;
    font-size:2.1rem;
    box-shadow:0 0 0 3px var(--gold), 0 8px 18px rgba(0,0,0,0.3);
  }
  .hero p{ font-size:0.8rem; color:rgba(246,241,228,0.6); margin-top:6px; }

  .tabs{ display:flex; gap:6px; padding:16px 16px 14px; }
  .tab{
    flex:1; text-align:center; padding:10px 4px;
    border:1px solid rgba(230,197,101,0.35);
    border-radius:10px;
    font-size:0.76rem;
    color:rgba(246,241,228,0.75);
    cursor:pointer;
  }
  .tab.active{ background:var(--gold); color:var(--emerald-deep); border-color:var(--gold); font-weight:800; }

  .panel{ display:none; padding:0 16px; }
  .panel.active{ display:block; animation:fadeIn .2s ease; }
  @keyframes fadeIn{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:none;} }

  .card{
    background:var(--parchment); color:var(--ink);
    border-radius:14px; padding:18px;
    margin-bottom:14px;
    box-shadow:0 8px 20px rgba(0,0,0,0.28);
    border:1px solid var(--parchment-dark);
  }
  .field{ margin-bottom:12px; }
  .field label{ display:block; font-size:0.78rem; color:var(--emerald); font-weight:700; margin-bottom:5px; }
  .field input, .field select, .field textarea{
    width:100%; padding:10px 12px;
    border:1.5px solid var(--parchment-dark); border-radius:8px;
    font-family:'Cairo', sans-serif; font-size:0.9rem;
    background:#fff; color:var(--ink);
  }
  .row2{ display:flex; gap:8px; }
  .row2 .field{ flex:1; }

  .btn{
    display:block; width:100%; padding:12px;
    border:none; border-radius:9px;
    background:linear-gradient(135deg, var(--emerald), var(--emerald-deep));
    color:var(--gold-bright);
    font-family:'Cairo', sans-serif; font-weight:800; font-size:0.9rem;
    cursor:pointer;
  }
  .btn.gold{ background:linear-gradient(135deg, var(--gold-bright), var(--gold)); color:var(--emerald-deep); }
  .btn.ghost{ background:transparent; border:1.5px solid var(--emerald); color:var(--emerald); }
  .btn.danger{ background:linear-gradient(135deg, #a5322a, #7a231d); color:#fff; }

  .hint{ font-size:0.74rem; color:rgba(28,36,32,0.55); margin-top:6px; text-align:center; }

  .entry{
    background:var(--parchment); color:var(--ink);
    border-radius:12px; padding:13px 15px; margin-bottom:9px;
    border-inset-start:4px solid var(--gold);
    border-right:4px solid var(--gold);
    position:relative;
  }
  .entry .top{ display:flex; justify-content:space-between; margin-bottom:4px; }
  .entry .type{ font-weight:800; font-size:0.88rem; }
  .entry .date{ font-size:0.7rem; color:rgba(28,36,32,0.5); }
  .entry .detail{ font-size:0.82rem; color:rgba(28,36,32,0.75); margin-bottom:2px; }
  .entry .del{ position:absolute; left:12px; bottom:10px; font-size:0.7rem; color:#a5322a; cursor:pointer; }

  .student-item{
    background:var(--parchment); color:var(--ink);
    border-radius:12px; padding:13px 15px; margin-bottom:9px;
    display:flex; justify-content:space-between; align-items:center;
    cursor:pointer; border:1px solid var(--parchment-dark);
  }
  .student-item .name{ font-weight:800; font-size:0.95rem; }
  .student-item .count{ font-size:0.72rem; color:rgba(28,36,32,0.55); margin-top:2px;}
  .student-item .balance{ font-weight:800; font-size:0.85rem; }
  .balance.due{ color:#a5322a; }
  .balance.clear{ color:var(--emerald); }

  .empty{ text-align:center; padding:30px 20px; color:rgba(246,241,228,0.55); font-size:0.85rem; }

  .page-header{ display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
  .page-header h3{ font-family:'Amiri', serif; color:var(--gold-bright); font-size:1.15rem; }
  .back-link{ font-size:0.8rem; color:var(--gold-bright); cursor:pointer; text-decoration:underline; }

  .summary-card{
    background:linear-gradient(135deg, var(--emerald), var(--emerald-light));
    border-radius:14px; padding:14px 16px; margin-bottom:14px;
    display:flex; justify-content:space-between;
  }
  .summary-card div{ text-align:center; flex:1; }
  .summary-card .label{ font-size:0.68rem; color:rgba(246,241,228,0.7); margin-bottom:3px;}
  .summary-card .value{ font-size:1rem; font-weight:800; color:var(--gold-bright); }

  .section-title{ font-size:0.85rem; font-weight:800; color:var(--gold-bright); margin:14px 0 8px; }

  .toast{
    position:fixed; bottom:20px; right:50%; transform:translateX(50%);
    background:var(--gold-bright); color:var(--emerald-deep);
    padding:11px 20px; border-radius:30px; font-weight:800; font-size:0.8rem;
    box-shadow:0 8px 20px rgba(0,0,0,0.4);
    opacity:0; pointer-events:none; transition:opacity .3s, transform .3s;
    z-index:999; white-space:nowrap;
  }
  .toast.show{ opacity:1; transform:translateX(50%) translateY(-6px); }
</style>
</head>
<body>

<header>
  <a class="back" href="index.html">◀ الدفاتر</a>
  <h1 class="brand-name">دفتر دروس القرآن</h1>
  <div class="spacer"></div>
</header>

<div class="hero">
  <div class="badge">📖</div>
  <p>متابعتك الشخصية، ومتابعة كل طالب في صفحته</p>
</div>

<div class="tabs">
  <div class="tab active" data-tab="personal" onclick="switchTab('personal')">متابعتي</div>
  <div class="tab" data-tab="lesson" onclick="switchTab('lesson')">تسجيل حصة</div>
  <div class="tab" data-tab="students" onclick="switchTab('students')">الطلاب</div>
</div>

<!-- ===== متابعتي الشخصية ===== -->
<div class="panel active" id="panel-personal">
  <div class="card">
    <div class="field">
      <label>نوع المتابعة</label>
      <select id="p-type">
        <option>حفظ جديد</option>
        <option>مراجعة</option>
      </select>
    </div>
    <div class="row2">
      <div class="field"><label>من</label><input id="p-from" placeholder="مثال: البقرة ١"></div>
      <div class="field"><label>إلى</label><input id="p-to" placeholder="مثال: البقرة ٢٠"></div>
    </div>
    <div class="field"><label>ملاحظات (اختياري)</label><textarea id="p-notes" rows="2"></textarea></div>
    <button class="btn gold" onclick="addPersonal()">حفظ المتابعة</button>
  </div>
  <div class="section-title">سجل متابعتي</div>
  <div id="personal-list"></div>
</div>

<!-- ===== تسجيل حصة لطالب ===== -->
<div class="panel" id="panel-lesson">
  <div class="card">
    <div class="field">
      <label>اسم الطالب</label>
      <input id="l-name" list="students-list" placeholder="مثال: عبدالله محمد">
      <datalist id="students-list"></datalist>
    </div>
    <div class="field" id="fee-field">
      <label>الاشتراك الشهري (جنيه) — لطالب جديد فقط</label>
      <input id="l-fee" type="number" min="0" placeholder="مثال: 150">
    </div>
    <div class="field">
      <label>نوع الحصة</label>
      <select id="l-type">
        <option>تسميع حفظ جديد</option>
        <option>مراجعة</option>
        <option>تجويد</option>
      </select>
    </div>
    <div class="row2">
      <div class="field"><label>من</label><input id="l-from" placeholder="مثال: يس ١"></div>
      <div class="field"><label>إلى</label><input id="l-to" placeholder="مثال: يس ١٥"></div>
    </div>
    <div class="field">
      <label>التقييم</label>
      <select id="l-eval">
        <option>ممتاز</option>
        <option>جيد جدًا</option>
        <option>جيد</option>
        <option>مقبول</option>
        <option>يحتاج إعادة</option>
      </select>
    </div>
    <div class="field"><label>ملاحظات (اختياري)</label><textarea id="l-notes" rows="2"></textarea></div>
    <button class="btn gold" onclick="submitLesson()">حفظ الحصة</button>
    <p class="hint">لو اسم الطالب موجود من قبل، هتتضاف الحصة على صفحته وهيتجاهل الاشتراك الشهري الجديد</p>
  </div>
</div>

<!-- ===== دفتر الطلاب ===== -->
<div class="panel" id="panel-students">
  <div class="card">
    <input id="search-box" placeholder="🔍 دور باسم الطالب..." oninput="renderStudentList()">
  </div>
  <div id="student-list"></div>
  <div style="display:flex; gap:8px; margin-top:16px;">
    <button class="btn ghost" style="flex:1; font-size:0.78rem; padding:10px;" onclick="exportBackup()">⬇ نسخة احتياطية</button>
    <label class="btn ghost" style="flex:1; font-size:0.78rem; padding:10px; text-align:center; cursor:pointer;">
      ⬆ استرجاع نسخة
      <input type="file" accept=".json" style="display:none" onchange="importBackup(this)">
    </label>
  </div>
</div>

<!-- ===== صفحة الطالب ===== -->
<div class="panel" id="panel-student-page">
  <div class="page-header">
    <h3 class="brand-name" id="student-page-name"></h3>
    <span class="back-link" onclick="switchTab('students')">◀ رجوع للطلاب</span>
  </div>

  <div class="summary-card">
    <div><div class="label">الاشتراك الشهري</div><div class="value" id="s-fee">0</div></div>
    <div><div class="label">مدفوع هذا الشهر</div><div class="value" id="s-paid-month">0</div></div>
    <div><div class="label">الباقي هذا الشهر</div><div class="value" id="s-due-month">0</div></div>
  </div>

  <div style="display:flex; gap:8px; margin-bottom:6px;">
    <button class="btn ghost" style="flex:1; font-size:0.8rem;" onclick="newLessonForStudent()">+ حصة جديدة</button>
    <button class="btn gold" style="flex:1; font-size:0.8rem;" onclick="openPaymentForm()">+ تسجيل دفعة</button>
  </div>

  <div class="card" id="payment-form" style="display:none;">
    <div class="field"><label>المبلغ المدفوع (جنيه)</label><input id="pay-amount" type="number" min="0"></div>
    <div class="field"><label>ملاحظة (اختياري)</label><input id="pay-note" placeholder="مثال: دفعة شهر أغسطس"></div>
    <button class="btn gold" onclick="submitPayment()">حفظ الدفعة</button>
  </div>

  <div class="section-title">سجل الحصص</div>
  <div id="student-lessons"></div>

  <div class="section-title">سجل المدفوعات</div>
  <div id="student-payments"></div>

  <button class="btn danger" style="margin-top:18px;" onclick="deleteStudent()">🗑 حذف صفحة هذا الطالب نهائياً</button>
</div>

<div class="toast" id="toast"></div>

<script>
let students = {};
let personalLog = [];
let currentStudent = null;
const STUDENTS_KEY = "quran-students";
const PERSONAL_KEY = "quran-personal";

function loadData(){
  try{
    students = JSON.parse(localStorage.getItem(STUDENTS_KEY) || "{}");
  }catch(e){ students = {}; }
  try{
    personalLog = JSON.parse(localStorage.getItem(PERSONAL_KEY) || "[]");
  }catch(e){ personalLog = []; }
  renderPersonalList();
  renderStudentList();
  refreshStudentsList();
}

function saveStudents(){
  try{ localStorage.setItem(STUDENTS_KEY, JSON.stringify(students)); }
  catch(e){ showToast('تعذر حفظ بيانات الطلاب'); }
}
function savePersonal(){
  try{ localStorage.setItem(PERSONAL_KEY, JSON.stringify(personalLog)); }
  catch(e){ showToast('تعذر حفظ المتابعة الشخصية'); }
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=> t.classList.remove('show'), 2200);
}

function switchTab(name){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  if(name==='personal'){
    document.querySelector('.tab[data-tab="personal"]').classList.add('active');
    document.getElementById('panel-personal').classList.add('active');
  } else if(name==='lesson'){
    document.querySelector('.tab[data-tab="lesson"]').classList.add('active');
    document.getElementById('panel-lesson').classList.add('active');
  } else if(name==='students'){
    document.querySelector('.tab[data-tab="students"]').classList.add('active');
    document.getElementById('panel-students').classList.add('active');
    renderStudentList();
  } else if(name==='student-page'){
    document.getElementById('panel-student-page').classList.add('active');
  }
}

/* ===== متابعتي الشخصية ===== */
function addPersonal(){
  const type = document.getElementById('p-type').value;
  const from = document.getElementById('p-from').value.trim();
  const to = document.getElementById('p-to').value.trim();
  const notes = document.getElementById('p-notes').value.trim();
  if(!from){ showToast('اكتب من أين بدأت على الأقل'); return; }
  personalLog.unshift({ type, from, to, notes, date: new Date().toLocaleDateString('ar-EG') });
  savePersonal();
  renderPersonalList();
  document.getElementById('p-from').value = '';
  document.getElementById('p-to').value = '';
  document.getElementById('p-notes').value = '';
  showToast('تم حفظ المتابعة ✅');
}

function renderPersonalList(){
  const list = document.getElementById('personal-list');
  if(personalLog.length === 0){
    list.innerHTML = `<div class="empty">لسه مفيش متابعة مسجلة</div>`;
    return;
  }
  list.innerHTML = personalLog.map((e,i)=>`
    <div class="entry">
      <div class="top"><span class="type">${e.type}</span><span class="date">${e.date}</span></div>
      <div class="detail">من ${e.from}${e.to ? ' إلى ' + e.to : ''}</div>
      ${e.notes ? `<div class="detail">${e.notes}</div>` : ''}
      <span class="del" onclick="deletePersonal(${i})">حذف</span>
    </div>
  `).join('');
}

function deletePersonal(i){
  if(!confirm('حذف هذا السجل؟')) return;
  personalLog.splice(i,1);
  savePersonal();
  renderPersonalList();
}

/* ===== تسجيل حصة ===== */
function refreshStudentsList(){
  const dl = document.getElementById('students-list');
  dl.innerHTML = Object.keys(students).map(n=>`<option value="${n}">`).join('');
}

function submitLesson(){
  const name = document.getElementById('l-name').value.trim();
  const fee = parseFloat(document.getElementById('l-fee').value) || 0;
  const type = document.getElementById('l-type').value;
  const from = document.getElementById('l-from').value.trim();
  const to = document.getElementById('l-to').value.trim();
  const evaluation = document.getElementById('l-eval').value;
  const notes = document.getElementById('l-notes').value.trim();

  if(!name){ showToast('اكتب اسم الطالب أولاً'); return; }
  if(!from){ showToast('اكتب من أين الحصة على الأقل'); return; }

  const isNew = !students[name];
  if(isNew){
    students[name] = { monthlyFee: fee, lessons: [], payments: [] };
  }
  students[name].lessons.unshift({
    type, from, to, evaluation, notes,
    date: new Date().toISOString()
  });

  saveStudents();
  refreshStudentsList();

  document.getElementById('l-from').value = '';
  document.getElementById('l-to').value = '';
  document.getElementById('l-notes').value = '';
  document.getElementById('l-fee').value = '';

  showToast(isNew ? `تم فتح صفحة جديدة لـ ${name} ✅` : `تم تسجيل الحصة لـ ${name} ✅`);
}

/* ===== دفتر الطلاب ===== */
function renderStudentList(){
  const q = (document.getElementById('search-box')?.value || '').trim();
  const list = document.getElementById('student-list');
  const names = Object.keys(students).filter(n => n.includes(q));

  if(names.length === 0){
    list.innerHTML = `<div class="empty">لسه مفيش طلاب مسجلين${q ? ' بهذا الاسم' : ''}<br>سجل أول حصة من تبويب "تسجيل حصة"</div>`;
    return;
  }

  list.innerHTML = names.map(name=>{
    const s = students[name];
    const due = monthDue(s);
    return `<div class="student-item" onclick="openStudent('${name.replace(/'/g,"\\'")}')">
      <div>
        <div class="name">${name}</div>
        <div class="count">${s.lessons.length} حصة مسجلة</div>
      </div>
      <div class="balance ${due > 0 ? 'due' : 'clear'}">
        ${due > 0 ? due + ' ج متبقي هذا الشهر' : 'مسدد هذا الشهر'}
      </div>
    </div>`;
  }).join('');
}

function computePaymentsWithBalance(s){
  // نرتب زمنيًا من الأقدم للأحدث عشان نحسب الرصيد التراكمي الصحيح لكل شهر
  const sorted = s.payments
    .map((p, originalIndex) => ({...p, originalIndex}))
    .sort((a,b)=> new Date(a.date) - new Date(b.date));

  const monthCumulative = {}; // key: "YYYY-M" -> إجمالي مدفوع حتى الآن
  const results = [];

  sorted.forEach(p=>{
    const d = new Date(p.date);
    const key = d.getFullYear() + '-' + d.getMonth();
    monthCumulative[key] = (monthCumulative[key] || 0) + p.amount;
    const cumulative = monthCumulative[key];
    const remain = s.monthlyFee - cumulative;
    results.push({
      ...p,
      remainAfter: remain > 0 ? remain : 0,
      extraAfter: remain < 0 ? Math.abs(remain) : 0,
      fullyPaid: remain <= 0
    });
  });

  // نرجعهم لنفس ترتيب العرض الأصلي (الأحدث أولاً)
  results.sort((a,b)=> b.originalIndex - a.originalIndex);
  return results;
}

function monthPaid(s){
  const now = new Date();
  return s.payments
    .filter(p => { const d = new Date(p.date); return d.getMonth()===now.getMonth() && d.getFullYear()===now.getFullYear(); })
    .reduce((sum,p)=> sum + p.amount, 0);
}
function monthDue(s){
  const paid = monthPaid(s);
  const remaining = s.monthlyFee - paid;
  return remaining > 0 ? remaining : 0;
}

function openStudent(name){
  currentStudent = name;
  const s = students[name];
  document.getElementById('student-page-name').textContent = name;
  document.getElementById('s-fee').textContent = s.monthlyFee + ' ج';
  const paid = monthPaid(s);
  document.getElementById('s-paid-month').textContent = paid + ' ج';
  document.getElementById('s-due-month').textContent = monthDue(s) + ' ج';
  document.getElementById('payment-form').style.display = 'none';

  document.getElementById('student-lessons').innerHTML = s.lessons.length === 0
    ? `<div class="empty">لسه مفيش حصص مسجلة</div>`
    : s.lessons.map((l,i)=>`
      <div class="entry">
        <div class="top"><span class="type">${l.type}</span><span class="date">${new Date(l.date).toLocaleDateString('ar-EG')}</span></div>
        <div class="detail">من ${l.from}${l.to ? ' إلى ' + l.to : ''}</div>
        <div class="detail">التقييم: ${l.evaluation}</div>
        ${l.notes ? `<div class="detail">${l.notes}</div>` : ''}
        <span class="del" onclick="deleteLesson(${i})">حذف</span>
      </div>
    `).join('');

  const paymentsWithBalance = computePaymentsWithBalance(s);
  document.getElementById('student-payments').innerHTML = s.payments.length === 0
    ? `<div class="empty">لسه مفيش دفعات مسجلة</div>`
    : paymentsWithBalance.map((p)=>`
      <div class="entry">
        <div class="top"><span class="type">${p.amount} جنيه</span><span class="date">${new Date(p.date).toLocaleDateString('ar-EG')}</span></div>
        ${p.note ? `<div class="detail">${p.note}</div>` : ''}
        <div class="detail">
          ${p.fullyPaid
            ? (p.extraAfter > 0 ? `تم السداد بالكامل، وزيادة ${p.extraAfter} جنيه` : 'تم السداد بالكامل لهذا الشهر ✅')
            : `الباقي بعد هذه الدفعة: ${p.remainAfter} جنيه`}
        </div>
        <span class="del" onclick="deletePayment(${p.originalIndex})">حذف</span>
      </div>
    `).join('');

  switchTab('student-page');
}

function newLessonForStudent(){
  document.getElementById('l-name').value = currentStudent;
  switchTab('lesson');
}

function openPaymentForm(){
  const form = document.getElementById('payment-form');
  form.style.display = form.style.display === 'none' ? 'block' : 'none';
}

function submitPayment(){
  const amount = parseFloat(document.getElementById('pay-amount').value);
  const note = document.getElementById('pay-note').value.trim();
  if(!amount || amount <= 0){ showToast('اكتب مبلغ صحيح'); return; }
  students[currentStudent].payments.unshift({ amount, note, date: new Date().toISOString() });
  saveStudents();
  document.getElementById('pay-amount').value = '';
  document.getElementById('pay-note').value = '';
  document.getElementById('payment-form').style.display = 'none';
  showToast('تم تسجيل الدفعة ✅');
  openStudent(currentStudent);
}

function deleteLesson(i){
  if(!confirm('حذف هذه الحصة؟')) return;
  students[currentStudent].lessons.splice(i,1);
  saveStudents();
  openStudent(currentStudent);
}
function deletePayment(i){
  if(!confirm('حذف هذه الدفعة؟')) return;
  students[currentStudent].payments.splice(i,1);
  saveStudents();
  openStudent(currentStudent);
}

async function deleteStudent(){
  if(!currentStudent) return;
  const sure = confirm(`متأكد إنك عايز تمسح صفحة "${currentStudent}" بكل حصصه ومدفوعاته نهائياً؟`);
  if(!sure) return;
  delete students[currentStudent];
  saveStudents();
  refreshStudentsList();
  showToast(`تم حذف صفحة ${currentStudent}`);
  currentStudent = null;
  switchTab('students');
}

/* ===== نسخ احتياطي ===== */
function exportBackup(){
  const data = { students, personalLog };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'نسخة-احتياطية-القرآن-' + new Date().toLocaleDateString('en-GB').replace(/\//g,'-') + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function importBackup(input){
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    try{
      const data = JSON.parse(e.target.result);
      students = data.students || {};
      personalLog = data.personalLog || [];
      saveStudents();
      savePersonal();
      refreshStudentsList();
      renderStudentList();
      renderPersonalList();
      showToast('تم استرجاع النسخة الاحتياطية ✅');
    }catch(err){
      showToast('الملف غير صالح');
    }
  };
  reader.readAsText(file);
}

loadData();
</script>
